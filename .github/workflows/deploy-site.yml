name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "site/**"
      - "src/**"
      - "data/**"
      - "scripts/**"
      - "Makefile"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so Quartz's CreatedModifiedDate plugin can read
          # per-file git dates (otherwise it falls back to filesystem mtime,
          # which on CI is the checkout time — useless).
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build graph + Quartz site + stage viewer
        # `make site-build` runs build-graph.js, then npx quartz build, then
        # copies src/ + data/*.json into site/public/{graph,data}/ so the
        # ontology viewer publishes at /information-book/graph/.
        run: make site-build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
