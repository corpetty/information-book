<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Information Book — Ontology</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Information Book — Ontology</h1>
      <div id="stats">loading…</div>
    </div>
    <nav id="view-tabs" aria-label="View"></nav>
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search nodes…" autocomplete="off" />
      <button id="search-clear" title="Clear search" type="button" aria-label="Clear">×</button>
    </div>
  </header>
  <div id="view-desc"></div>
  <main>
    <aside id="legend"></aside>
    <div id="graph"></div>
    <aside id="detail"><div class="empty">Click a node to inspect.</div></aside>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
